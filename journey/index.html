<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="view-transition" content="same-origin" />
    <title>Journey | Joshua Chau</title>
    <link rel="icon" href="/pics/web-logo.png" type="image/png" />
    <meta
      name="description"
      content="A map of places Joshua Chau has visited and hopes to visit in the future."
    />
    <meta property="og:title" content="Journey | Joshua Chau" />
    <meta
      property="og:description"
      content="A map of places Joshua Chau has visited and hopes to visit in the future."
    />
    <meta
      property="og:image"
      content="https://joshua-chau.github.io/pics/web-logo.png"
    />
    <meta property="og:url" content="https://joshua-chau.github.io/journey" />
    <meta property="og:type" content="website" />
    <script>
      // Apply saved theme immediately to prevent flash of wrong theme
      (() => {
        const theme =
          localStorage.getItem("theme") ||
          (window.matchMedia("(prefers-color-scheme: dark)").matches
            ? "dark"
            : "light");
        document.documentElement.setAttribute("data-theme", theme);
      })();
    </script>
    <link rel="stylesheet" href="/src/css/style.css" />

    <!-- Leaflet CSS -->
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />

    <!-- Leaflet JS -->
    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>

    <script type="module" src="/src/js/main.js"></script>
    <script type="module" src="/src/js/journey.js"></script>
  </head>

  <body>
    <!-- Sidebar Toggle Button (mobile only) -->
    <button
      id="sidebarToggle"
      class="sidebar-toggle"
      aria-label="Open sidebar"
      title="Open sidebar"
    >
      ☰
    </button>
    <!-- Mobile Backdrop -->
    <div id="sidebarBackdrop" class="backdrop"></div>

    <header class="sidebar" id="appSidebar">
      <!-- Top: Expand/Collapse Button -->
      <div class="sidebar-top">
        <button
          id="sidebarExpandBtn"
          class="sidebar-expand-btn"
          aria-label="Expand sidebar"
          title="Expand sidebar"
        >
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <line x1="3" y1="6" x2="21" y2="6"></line>
            <line x1="3" y1="12" x2="21" y2="12"></line>
            <line x1="3" y1="18" x2="21" y2="18"></line>
          </svg>
        </button>
      </div>

      <h2 class="sidebar-name">Joshua Chau</h2>

      <nav>
        <a href="/">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
            <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
          </svg>
          <span class="nav-label">About</span>
        </a>
        <a href="/journal/">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34a.9959.9959 0 0 0-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"
            />
          </svg>
          <span class="nav-label">Journal</span>
        </a>
        <a href="/professions/">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M20 6h-4V4c0-1.11-.89-2-2-2h-4c-1.11 0-2 .89-2 2v2H4c-1.11 0-1.99.89-1.99 2L2 19c0 1.11.89 2 2 2h16c1.11 0 2-.89 2-2V8c0-1.11-.89-2-2-2zm-6 0h-4V4h4v2z"
            />
          </svg>
          <span class="nav-label">Professions</span>
        </a>
        <a href="/journey/" class="active">
          <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor">
            <path
              d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"
            />
          </svg>
          <span class="nav-label">Journey</span>
        </a>
      </nav>

      <!-- Bottom: Theme toggle + Avatar -->
      <div class="sidebar-bottom">
        <button
          id="themeToggle"
          class="theme-toggle"
          aria-label="Toggle theme"
          title="Toggle theme"
        >
          <span class="nav-icon">🌙</span>
          <span class="nav-label">Dark mode</span>
        </button>
      </div>
    </header>
    <script>
      if (localStorage.getItem("sidebar-expanded") === "true") {
        document.getElementById("appSidebar").classList.add("expanded");
      }
    </script>

    <div class="content-wrapper">
      <main>
        <section class="intro fade-in">
          <h2>My Journey</h2>
          <p>
            A map pinpointing places I've been and where I'm hoping to visit in
            the future.
          </p>

          <div class="map-legend">
            <span class="legend-item"
              ><span class="legend-color visited"></span> Visited</span
            >
            <span class="legend-item"
              ><span class="legend-color future"></span> Future</span
            >
          </div>

          <div class="map-container-wrapper">
            <div id="journeyMap" class="journey-map"></div>
          </div>

          <div id="photos-section" class="photos-section hidden">
            <h3 id="photos-title">Photos</h3>
            <div class="photos-grid">
              <p class="placeholder-text">
                To be updated... (photos collection being developed continually)
              </p>
            </div>
          </div>
        </section>
      </main>

      <footer>
        <a
          href="https://github.com/joshua-chau"
          target="_blank"
          rel="noopener noreferrer"
          title="View on GitHub"
          class="github-btn"
        >
          <svg
            aria-hidden="true"
            width="24"
            height="24"
            fill="currentColor"
            style="width: 24px; height: 24px"
          >
            <use href="/pics/icons.svg#github"></use>
          </svg>
        </a>
        <a
          href="https://www.linkedin.com/in/tsz-tung-chau/"
          target="_blank"
          rel="noopener noreferrer"
          title="View on LinkedIn"
          class="linkedin-btn"
        >
          <svg
            aria-hidden="true"
            width="24"
            height="24"
            fill="currentColor"
            style="width: 24px; height: 24px"
          >
            <use href="/pics/icons.svg#linkedin"></use>
          </svg>
        </a>
      </footer>
    </div>
  </body>
</html>
